version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: nongdam-mysql
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: nongdam
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    volumes:
      - mysql-data:/var/lib/mysql

  minio:
    image: minio/minio
    container_name: nongdam-minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nongdam-server
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - mysql
      - minio
    env_file:
      - .env.local

volumes:
  mysql-data:
  minio-data:
